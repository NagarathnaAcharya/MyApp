name: React Native Android CI

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Check Java Version
        run: java -version

      - name: Check Node Version
        run: node -v

      - name: Check npm Version
        run: npm -v

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Print Hello
        run: echo "Hello from GitHub Actions!"

      - name: Make Gradle Executable
        run: chmod +x android/gradlew

      - name: Build Release APK and AAB
        run: |
          cd android
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Install rclone
        run: curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        shell: bash
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << 'EOF'
          ${{ secrets.RCLONE_CONFIG }}
          EOF
      - name: Verify rclone config
        run: |
         echo "Listing remotes..."
         rclone listremotes

         echo "Showing config..."
         rclone config show     

      - name: Upload Release APK to Google Drive
        run: |
          rclone copyto android/app/build/outputs/apk/release/app-release.apk \
            "gdrive:CI-Builds/Android/app-release-${{ github.run_number }}.apk" \
            --drive-use-trash=false \
            -v

      - name: Generate CHANGELOG
        run: |
          git log -10 --pretty=format:"- %s" > CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          body_path: CHANGELOG.md
          files: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab

      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Android Build Successful"
          to: ${{ secrets.EMAIL_RECIPIENT }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Hello,

            Your Android build completed successfully.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Release APK and Android App Bundle (AAB) have been generated.

            They have been:
            - Uploaded as GitHub Artifacts
            - Uploaded to Google Drive
            - Attached to the GitHub Release

            Regards,
            GitHub Actions
